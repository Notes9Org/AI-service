# Deploy Internal Agent (Notes9, chat) to AWS Lambda.
# Uses environment "internal-production" - configure ECR_REPOSITORY, LAMBDA_FUNCTION_NAME there.
# No VPC required - user creates new Lambda for this.
# AWS Transcribe: Lambda must have IAM permissions (transcribe:StartStreamTranscriptionWebSocket
# or lambda:InvokeFunction) and env vars: AWS_TRANSCRIBE_SERVICE_URL or AWS_TRANSCRIBE_LAMBDA_FUNCTION_NAME.
name: Deploy Internal

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-internal.yml'

concurrency:
  group: deploy-internal-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  validate:
    name: Validate secrets
    runs-on: ubuntu-latest
    environment: internal-production
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are required"
            exit 1
          fi
          if [ -z "${{ secrets.ECR_REPOSITORY }}" ]; then
            echo "::error::ECR_REPOSITORY is required in internal-production environment"
            exit 1
          fi
          if [ -z "${{ secrets.LAMBDA_FUNCTION_NAME }}" ]; then
            echo "::error::LAMBDA_FUNCTION_NAME is required in internal-production environment"
            exit 1
          fi
          echo "Internal secrets validated"

  build-and-push:
    name: Build and Push Internal to ECR
    runs-on: ubuntu-latest
    needs: validate
    environment: internal-production
    env:
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: internal-${{ github.sha }}
        run: |
          docker build --provenance=false --platform=linux/amd64 \
            -f ./backend/Dockerfile.lambda \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy Internal to Lambda
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: internal-production
    env:
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda function code
        env:
          IMAGE_TAG: internal-${{ github.sha }}
        run: |
          REPO_URI=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text --region ${{ env.AWS_REGION }})
          IMAGE_URI="${REPO_URI}:${IMAGE_TAG}"
          aws lambda update-function-code \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --image-uri "$IMAGE_URI"

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated-v2 \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Update Lambda configuration (timeout, memory)
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --timeout 900 \
            --memory-size 3000

      - name: Wait for configuration update
        run: |
          aws lambda wait function-updated-v2 \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query 'Configuration.[State, LastUpdateStatus, LastUpdateStatusReason]' \
            --output table
