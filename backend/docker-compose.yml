services:
  api:
    build: .
    container_name: notes9-python-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  worker:
    build: .
    container_name: notes9-python-worker
    command: ["python", "worker.py"]
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
